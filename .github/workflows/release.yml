name: Build and Release Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        platform:
          - linux/amd64
        include:
          - platform: linux/amd64
            arch: amd64
        # 注意: Google Chrome 只支持 amd64，不构建 arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: openclaw-ubuntu:${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export image to tar.gz (split if > 1.9GB)
        run: |
          docker save openclaw-ubuntu:${{ matrix.arch }} | gzip > docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz
          FILE_SIZE=$(stat -c%s docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz)
          echo "File size: $FILE_SIZE bytes"
          
          # If larger than 1.9GB, split into parts
          if [ $FILE_SIZE -gt 1900000000 ]; then
            echo "File too large, splitting..."
            split -b 1900M docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz.part-
            rm docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz
            ls -lh docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz.part-*
          else
            ls -lh docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.arch }}
          path: docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz*
          retention-days: 1

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          mv artifacts/docker-image-amd64/docker-openclaw-ubuntu-amd64.tar.gz* release/
          # 注意: Google Chrome 只支持 amd64，没有 arm64 镜像
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## OpenClaw Docker - Ubuntu 22.04
            
            ### 架构支持
            
            ⚠️ **仅支持 amd64 (x86_64)**，因为 Google Chrome 不支持 ARM 架构。
            
            ### 下载说明
            
            下载 `docker-openclaw-ubuntu-amd64.tar.gz*` 文件。
            
            > 如果文件被分卷（如 `.part-aa`, `.part-ab`），需要先合并再导入。
            
            ### 使用方法
            
            **单文件：**
            ```bash
            gunzip -c docker-openclaw-ubuntu-amd64.tar.gz | docker load
            ```
            
            **分卷文件（超过 2GB）：**
            ```bash
            cat docker-openclaw-ubuntu-amd64.tar.gz.part-* | docker load
            ```
            
            **运行容器：**
            ```bash
            docker run -d \
              --name openclaw-gateway \
              -e MODEL_ID=gpt-4 \
              -e BASE_URL=https://api.openai.com/v1 \
              -e API_KEY=sk-xxx \
              -e OPENCLAW_GATEWAY_TOKEN=your-token \
              -e OPENCLAW_GATEWAY_BIND=0.0.0.0 \
              -e OPENCLAW_GATEWAY_PORT=18789 \
              -p 18789:18789 \
              -p 18790:18790 \
              openclaw-ubuntu:amd64
            ```
            
            ### 或使用 GHCR 镜像
            
            ```bash
            docker pull ghcr.io/zhongqian97-code/docker-openclaw-ubuntu:latest
            ```
          files: release/*
          draft: false
          prerelease: false
