name: Build and Release Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: openclaw-ubuntu:${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export image to tar.gz
        run: |
          docker save openclaw-ubuntu:${{ matrix.arch }} | gzip > docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz
          ls -lh docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.arch }}
          path: docker-openclaw-ubuntu-${{ matrix.arch }}.tar.gz
          retention-days: 1

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          mv artifacts/docker-image-amd64/docker-openclaw-ubuntu-amd64.tar.gz release/
          mv artifacts/docker-image-arm64/docker-openclaw-ubuntu-arm64.tar.gz release/
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## OpenClaw Docker - Ubuntu 22.04
            
            ### 下载说明
            
            根据你的 CPU 架构选择对应的文件下载：
            - **Intel/AMD (x86_64)**: `docker-openclaw-ubuntu-amd64.tar.gz`
            - **Apple Silicon / ARM**: `docker-openclaw-ubuntu-arm64.tar.gz`
            
            ### 使用方法
            
            ```bash
            # 1. 下载后导入镜像
            gunzip -c docker-openclaw-ubuntu-amd64.tar.gz | docker load
            
            # 2. 运行容器
            docker run -d \
              --name openclaw-gateway \
              -e MODEL_ID=gpt-4 \
              -e BASE_URL=https://api.openai.com/v1 \
              -e API_KEY=sk-xxx \
              -e OPENCLAW_GATEWAY_TOKEN=your-token \
              -e OPENCLAW_GATEWAY_BIND=0.0.0.0 \
              -e OPENCLAW_GATEWAY_PORT=18789 \
              -p 18789:18789 \
              -p 18790:18790 \
              openclaw-ubuntu:amd64
            ```
            
            ### 或使用 GHCR 镜像（需要 docker pull）
            
            ```bash
            docker pull ghcr.io/zhongqian97-code/docker-openclaw-ubuntu:latest
            ```
          files: |
            release/docker-openclaw-ubuntu-amd64.tar.gz
            release/docker-openclaw-ubuntu-arm64.tar.gz
          draft: false
          prerelease: false
